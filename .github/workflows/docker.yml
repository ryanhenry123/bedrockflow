name: Docker

on:
  push:
    branches: [main, master]
  pull_request:

env:
  IMAGE: orchflow:ci
  TRIVY_VERSION: v0.71.2
  BUILDIMG: public.ecr.aws/docker/library/python:3.15.0b3-slim@sha256:544b7fae9bed4fd9e9b85546fed2c9226557b3aec3986e19976cb7468affd5d9

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build prod image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: dockerfile
          target: prod
          tags: ${{ env.IMAGE }}
          build-args: |
            BUILDIMG=${{ env.BUILDIMG }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d --name orchflow-smoke -p 8765:8765 "${IMAGE}"
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8765/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "server did not become ready" >&2
          docker logs orchflow-smoke >&2 || true
          exit 1

      - name: Stop smoke test container
        if: always()
        run: docker rm -f orchflow-smoke >/dev/null 2>&1 || true

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
