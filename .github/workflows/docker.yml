name: Docker

on:
  push:
    branches: [main, master]
  pull_request:

env:
  IMAGE: orchflow:ci
  TRIVY_VERSION: v0.71.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build prod image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfile
          target: prod
          tags: ${{ env.IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d --name orchflow-smoke -p 8765:8765 "${IMAGE}"
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8765/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "server did not become ready" >&2
          docker logs orchflow-smoke >&2 || true
          exit 1

      - name: Stop smoke test container
        if: always()
        run: docker rm -f orchflow-smoke >/dev/null 2>&1 || true

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
