default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^uv\.lock$
      - id: check-json
      - id: check-toml
      - id: debug-statements
      - id: check-added-large-files
        args: [--maxkb=1000]

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        language_version: python3.12
        files: ^(src|tests|examples)/

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.31.0
    hooks:
      - id: eslint
        files: \.js$
        types: [file]
        additional_dependencies:
          - eslint@9.31.0
          - "@eslint/js@9.31.0"
          - globals@16.3.0

  - repo: https://github.com/djlint/djLint
    rev: v1.36.4
    hooks:
      - id: djlint
        files: \.html$
        args:
          - --profile=jinja
          - --ignore=H030,H031,J004,J018

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c "uv sync --all-extras -q && uv run pytest -q"
        language: system
        pass_filenames: false
        always_run: true
